<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagem</title>
    <style>
        body {
            background-color: #000000;
            color: #333;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background-color: rgb(124, 124, 124);
            padding: 20px;
            border-radius: 10px;
        }

        #imagem {
            width: 350px;
            display: flex;
            text-align: center;
            align-items: center;
            justify-content: center;
        }

        h2 {
            font-size: 20px;
            border-bottom: 1px solid #ccc;
            margin-top: 20px;
        }

        h1 {
            text-align: center;
            color: #000;
        }

        .descricao {
            text-align: center;
            margin-bottom: 30px;
            font-style: italic;
        }

        ul {
            margin-left: 20px;
        }
    </style>

<body>
    <main class="container">
        <section class="card">
            <img src="images/card.png" alt="Imagem do personagem">
            <h1>Ragnar Bloodaxe</h1>
            <p class="descricao">Um guerreiro brutal das terras do norte, conhecido por sua sede de batalha e machado
                implacável.</p>
            <div class="habilidades">
                <h2>Habilidades</h2>
                <ul>
                    <li>Fúria berserker</li>
                    <li>Machado duplo devastador</li>
                    <li>Resistência sobre-humana</li>
                </ul>
            </div>
            <div class="caracteristicas">
                <h2>Características</h2>
                <p><strong>Classe:</strong> Bárbaro</p>
                <p><strong>Nível:</strong> 47</p>
                <p><strong>Elemento:</strong> Sangue</p>
            </div>
        </section>
    </main>
</body>

</html>
