<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personagem</title>

<body>
    <main class="container">
        <section class="card">
            <img src="images/card.png" alt="Imagem do personagem">
            <h1>Ragnar Bloodaxe</h1>
            <p class="descricao">Um guerreiro brutal das terras do norte, conhecido por sua sede de batalha e machado
                implacável.</p>
            <div class="habilidades">
                <h2>Habilidades</h2>
                <ul>
                    <li>Fúria berserker</li>
                    <li>Machado duplo devastador</li>
                    <li>Resistência sobre-humana</li>
                </ul>
            </div>
            <div class="caracteristicas">
                <h2>Características</h2>
                <p><strong>Classe:</strong> Bárbaro</p>
                <p><strong>Nível:</strong> 47</p>
                <p><strong>Elemento:</strong> Sangue</p>
            </div>
        </section>
    </main>
</body>

</html>
